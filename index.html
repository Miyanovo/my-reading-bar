<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界足迹 - 星之果实餐吧版</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        /* --- 🎨 基础配色 --- */
        :root {
            --primary-color: #7cb342; 
            --bg-main: #cbe3f7;
            --bg-panel: #ffffff;
            --text-dark: #5d4037;      
            --sdv-wood-dark: #4a2810;  
            --sdv-wood-light: #e0a663; 
            --sdv-blue-ui: #2d3690;    
            --sdv-cream: #ffefcd;      
            --sdv-border-gold: #f8b32e;
            --sdv-green: #48a826;      
            --sdv-red: #e63e3e;        
            --sdv-text-brown: #3f1807; 
            --pixel-box-shadow: inset 3px 3px 0px rgba(255,255,255,0.2), inset -3px -3px 0px rgba(0,0,0,0.3), 3px 0px 0px #000, -3px 0px 0px #000, 0px 3px 0px #000, 0px -3px 0px #000;
        }

        body { margin: 0; padding: 0; background-color: var(--bg-main); font-family: "Microsoft YaHei", sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #left-stage { flex: 1; position: relative; height: 100%; overflow: hidden; }
        #map-container { width: 100%; height: 100%; position: absolute; z-index: 1; }
        #main { width: 100%; height: 100%; }

        /* 频道切换器 */
        .channel-switcher { display: flex; border: 3px solid var(--sdv-wood-dark); border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #fff; }
        .channel-btn { flex: 1; padding: 10px; border: none; font-family: 'VT323'; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .channel-btn.active { background: var(--sdv-wood-dark); color: white; }

        /* 吧台界面 */
        #bar-interface {
            width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 10;
            background-color: #2a1d2a; display: flex; flex-direction: column; align-items: center;
            opacity: 0; visibility: hidden; transform: scale(1.1); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #bar-interface::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('8766400c5c1bdb4a4b48b00aedb331d.jpg'); background-size: cover;
            opacity: 0.3; z-index: -1; filter: blur(2px) brightness(0.6); 
        }
        body.bar-mode #bar-interface { opacity: 1; visibility: visible; transform: scale(1); }

        /* 侧边栏样式 */
        #control-panel-wrapper { position: relative; flex: 0 0 360px; height: 100%; transition: 0.3s; }
        #control-panel-wrapper.collapsed { margin-right: -360px; }
        #control-panel-body { width: 100%; height: 100%; background: var(--bg-panel); padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
        
        /* 列表项 */
        .country-item { margin-bottom: 15px; background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 12px; border-left: 5px solid var(--primary-color); }
        .book-row { display: flex; gap: 10px; padding: 8px 0; border-top: 1px dashed #eee; align-items: center; }
        .book-cover { width: 35px; height: 50px; border-radius: 4px; object-fit: cover; background: #eee; }
        .book-info { flex: 1; overflow: hidden; }
        .book-title { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 原有的吧台内部样式 */
        .bar-nav { display: flex; gap: 10px; margin: 20px 0; z-index: 20; background: #6b4322; padding: 10px; border-radius: 10px; }
        .bar-nav-item { padding: 8px 15px; background: var(--sdv-wood-light); cursor: pointer; font-family: 'Press Start 2P', 'SimSun'; font-size: 12px; border: 2px solid #593111; }
        .bar-nav-item.active { background: var(--sdv-red); color: #fff; }
        .bar-content { width: 90%; max-width: 500px; flex: 1; background: var(--sdv-blue-ui); border: 4px solid var(--sdv-border-gold); padding: 20px; overflow-y: auto; margin-bottom: 20px; border-radius: 10px; }
        .drink-card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; z-index: 100; transition: 0.3s; }
        .drink-card-overlay.show { opacity: 1; pointer-events: auto; }
        .drink-card { background: var(--sdv-cream); width: 320px; padding: 20px; border: 4px solid #3f1807; position: relative; text-align: center; }
        
        /* 输入框和按钮 */
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }
        #add-btn { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #toggle-sidebar-btn { position: absolute; left: -24px; top: 50%; width: 24px; height: 60px; background: #fff; border: 1px solid #ddd; border-right: none; cursor: pointer; }
        
        #loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .mystery-tag { background: #7e57c2; color: #fff; padding: 0 4px; border-radius: 3px; font-size: 10px; }
        .action-btn { cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div id="loading-mask">加载中...</div>

<div id="left-stage">
    <div id="map-container"><div id="main"></div></div>
    
    <div id="bar-interface">
        <div class="bar-nav">
            <div class="bar-nav-item active" onclick="switchBarTab('random')">🎁 每日特调</div>
            <div class="bar-nav-item" onclick="switchBarTab('fav')">🍷 酒窖</div>
        </div>
        <div class="bar-content">
            <div id="view-random" class="bar-view active" style="text-align: center; padding-top: 50px;">
                <h1 style="color: #fff; font-family: 'Press Start 2P'; font-size: 18px;">STARDROP SALOON</h1>
                <p style="color: #ccc; font-family: 'VT323';">点击调酒师，为你的记录配一杯酒</p>
                <button onclick="serveRandomDrink()" style="padding: 15px 30px; background: var(--sdv-green); color: white; border: none; font-family: 'Press Start 2P'; cursor: pointer; box-shadow: var(--pixel-box-shadow);">GIVE ME A DRINK!</button>
            </div>
            <div id="view-fav" class="bar-view" style="display:none">
                <div id="fav-container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="control-panel-wrapper">
    <div id="toggle-sidebar-btn" onclick="toggleSidebar()">▶</div>
    <div id="control-panel-body">
        <div class="channel-switcher">
            <button id="btn-book" class="channel-btn active" onclick="switchChannel('book')">📖 书籍记录</button>
            <button id="btn-movie" class="channel-btn" onclick="switchChannel('movie')">🎬 电影世界</button>
        </div>

        <h2 id="panel-title" style="margin: 0 0 15px 0; font-size: 20px;">🌿 阅读记录</h2>
        
        <div id="mystery-section" class="mode-switch-container" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 12px; background: #f0f0f0; padding: 8px; border-radius: 8px;">
            <span>🕵️ 仅看悬疑 (仅限书籍)</span>
            <input type="checkbox" id="mystery-toggle" onchange="updateUI()">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 12px; background: #fff3e0; padding: 8px; border-radius: 8px; border: 1px solid #ffe0b2;">
            <span>🍻 进入星之果实模式</span>
            <input type="checkbox" id="bar-toggle" onchange="toggleBarMode()">
        </div>

        <label style="font-size: 12px; font-weight: bold;">📍 选择地区</label>
        <select id="country-select" onchange="updateUI(this.value)"></select>

        <label style="font-size: 12px; font-weight: bold;" id="input-label">📖 录入书名</label>
        <input type="text" id="item-name" placeholder="回车智能搜索...">

        <button id="add-btn" onclick="addItem()">✨ 智能记录</button>

        <div id="list-display" style="flex: 1; overflow-y: auto; margin-top: 20px;"></div>
    </div>
</div>

<div class="drink-card-overlay" id="drink-overlay">
    <div class="drink-card">
        <div style="position: absolute; right: 10px; top: 10px; cursor: pointer; color: red; font-weight: bold;" onclick="closeDrinkCard()">X</div>
        <div id="card-icon" style="font-size: 50px;">🍸</div>
        <h3 id="card-title" style="margin: 10px 0; font-family: 'SimSun';">书名</h3>
        <p id="card-base" style="font-size: 12px; color: #888; border-bottom: 1px solid #ddd; padding-bottom: 10px;">GIN BASE</p>
        <div style="text-align: left; font-size: 13px; color: #5d4037;">
            <p><strong>风味:</strong> <span id="card-intro">...</span></p>
            <p><strong>配料:</strong> <span id="card-ingredients">...</span></p>
        </div>
        <button onclick="downloadCard()" style="margin-top: 10px; width: 100%; border: none; background: #e0a663; padding: 5px; cursor: pointer;">📥 下载卡片</button>
    </div>
</div>

<script>
    const BIN_ID = '6940072543b1c97be9efcbb6'; 
    const API_KEY = '$2a$10$NK41BeroKJUHwITABG5hSOUM2STrIJgPrdkrbHXwIWmI4pHlPR2da'; 

    const COCKTAIL_DB = [
        { name: 'Negroni', base: 'Gin', intro: '苦乐参半，如命运的玩笑。', materials: '金酒, 金巴利, 甜味美思', glass: 'Rocks' },
        { name: 'Old Fashioned', base: 'Whiskey', intro: '经典沉稳，岁月的余味。', materials: '波本威士忌, 方糖, 苦精', glass: 'Rocks' },
        { name: 'Mojito', base: 'Rum', intro: '清凉薄荷，夏日的白日梦。', materials: '白朗姆, 薄荷, 青柠, 苏打水', glass: 'Highball' },
        { name: 'Martini', base: 'Gin', intro: '冷峻优雅，锋利如刀。', materials: '金酒, 干味美思', glass: 'Martini' }
    ];

    let myBookData = {};
    let myMovieData = {};
    let currentChannel = 'book'; 
    let geoJsonData = null;
    let myChart = echarts.init(document.getElementById('main'));

    // 核心切换函数
    function switchChannel(type) {
        currentChannel = type;
        document.getElementById('btn-book').classList.toggle('active', type === 'book');
        document.getElementById('btn-movie').classList.toggle('active', type === 'movie');
        document.getElementById('panel-title').innerText = type === 'book' ? '🌿 阅读记录' : '🎬 电影世界';
        document.getElementById('input-label').innerText = type === 'book' ? '📖 录入书名' : '🎬 录入电影';
        document.getElementById('mystery-section').style.display = type === 'book' ? 'flex' : 'none';
        
        updateUI();
    }

    function loadCloudData() {
        fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } })
        .then(res => res.json())
        .then(data => {
            const record = data.record;
            myBookData = record.books || {};
            myMovieData = record.movies || {};
            updateUI();
            updateCountryDropdown();
            document.getElementById('loading-mask').style.display = 'none';
        });
    }

    function saveCloudData() {
        const payload = { books: myBookData, movies: myMovieData };
        fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(payload)
        });
    }

    function addItem() {
        const country = document.getElementById('country-select').value;
        const name = document.getElementById('item-name').value.trim();
        if(!country || !name) return alert("请选择国家并输入名称");

        const btn = document.getElementById('add-btn');
        btn.innerText = "🔍 搜寻中...";
        
        let url = currentChannel === 'book' 
            ? `https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(name)}&maxResults=1`
            : `https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=movie&limit=1`;

        fetch(url).then(res => res.json()).then(data => {
            let item = { title: name, author: "未知", cover: "", isMystery: false };
            if(currentChannel === 'book' && data.items) {
                const info = data.items[0].volumeInfo;
                item.title = info.title;
                item.author = info.authors ? info.authors[0] : "未知";
                item.cover = info.imageLinks ? info.imageLinks.smallThumbnail : "";
            } else if(currentChannel === 'movie' && data.results && data.results.length > 0) {
                const info = data.results[0];
                item.title = info.trackName;
                item.author = info.artistName || info.primaryGenreName;
                item.cover = info.artworkUrl100;
            }

            const targetData = currentChannel === 'book' ? myBookData : myMovieData;
            if(!targetData[country]) targetData[country] = [];
            targetData[country].push(item);
            
            document.getElementById('item-name').value = '';
            btn.innerText = "✨ 智能记录";
            updateUI();
            saveCloudData();
        });
    }

    function updateUI(filterCountry = "") {
        const container = document.getElementById('list-display');
        container.innerHTML = '';
        const activeData = currentChannel === 'book' ? myBookData : myMovieData;
        const isMysteryOnly = document.getElementById('mystery-toggle').checked;

        let displayData = {};
        for(let c in activeData) {
            let items = activeData[c];
            if(currentChannel === 'book' && isMysteryOnly) items = items.filter(i => i.isMystery);
            if(items.length > 0) displayData[c] = items;
        }

        for(let country in displayData) {
            if(filterCountry && country !== filterCountry) continue;
            const div = document.createElement('div');
            div.className = 'country-item';
            div.style.borderLeftColor = currentChannel === 'book' ? '#7cb342' : '#9c27b0';
            
            let html = `<div style="font-weight:bold;margin-bottom:8px;">${country} (${displayData[country].length})</div>`;
            displayData[country].forEach((item, idx) => {
                html += `
                    <div class="book-row">
                        <img src="${item.cover || ''}" class="book-cover">
                        <div class="book-info">
                            <div class="book-title">${item.title} ${item.isMystery ? '<span class="mystery-tag">🕵️</span>' : ''}</div>
                            <div style="font-size:10px;color:#999;">${item.author}</div>
                        </div>
                        <span class="action-btn" onclick="deleteItem('${country}', ${idx})">×</span>
                    </div>
                `;
            });
            div.innerHTML = html;
            container.appendChild(div);
        }
        renderMap(displayData, filterCountry);
    }

    function renderMap(data, highlight = "") {
        if(!geoJsonData) return;
        const mapData = Object.keys(data).map(c => ({ name: c, value: data[c].length }));
        
        // 电影模式使用紫色调，书籍模式使用绿色调
        const colorPalette = currentChannel === 'book' 
            ? ['#bae4b3', '#74c476', '#31a354', '#006d2c']
            : ['#e1bee7', '#ba68c8', '#8e24aa', '#4a148c'];

        myChart.setOption({
            backgroundColor: 'transparent',
            visualMap: { show: false, min: 0, max: 10, inRange: { color: colorPalette } },
            series: [{
                type: 'map', map: 'world', roam: true,
                emphasis: { itemStyle: { areaColor: '#fff176' } },
                data: mapData
            }]
        });
    }

    function toggleBarMode() {
        const isBar = document.getElementById('bar-toggle').checked;
        document.body.classList.toggle('bar-mode', isBar);
        if(!isBar) setTimeout(() => myChart.resize(), 100);
    }

    function serveRandomDrink() {
        const drink = COCKTAIL_DB[Math.floor(Math.random() * COCKTAIL_DB.length)];
        document.getElementById('card-title').innerText = "今日特调";
        document.getElementById('card-base').innerText = drink.base + " BASE";
        document.getElementById('card-intro').innerText = drink.intro;
        document.getElementById('card-ingredients').innerText = drink.materials;
        document.getElementById('drink-overlay').classList.add('show');
    }

    function closeDrinkCard() { document.getElementById('drink-overlay').classList.remove('show'); }

    function toggleSidebar() {
        const wrapper = document.getElementById('control-panel-wrapper');
        wrapper.classList.toggle('collapsed');
        document.getElementById('toggle-sidebar-btn').innerText = wrapper.classList.contains('collapsed') ? '◀' : '▶';
        setTimeout(() => myChart.resize(), 300);
    }

    function deleteItem(country, idx) {
        if(confirm("确定删除吗？")) {
            const targetData = currentChannel === 'book' ? myBookData : myMovieData;
            targetData[country].splice(idx, 1);
            if(targetData[country].length === 0) delete targetData[country];
            updateUI();
            saveCloudData();
        }
    }

    function updateCountryDropdown() {
        const select = document.getElementById('country-select');
        const countries = ["中国", "美国", "日本", "英国", "法国", "韩国", "德国", "意大利", "加拿大", "西班牙"];
        select.innerHTML = '<option value="">-- 全球视野 --</option>';
        countries.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.innerText = c;
            select.appendChild(opt);
        });
    }

    // 初始化地图
    fetch('https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/json/world.json')
        .then(res => res.json()).then(json => {
            geoJsonData = json;
            echarts.registerMap('world', json);
            loadCloudData();
        });

    window.addEventListener('resize', () => myChart.resize());
</script>
</body>
</html>
